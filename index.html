<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Account</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">

</head>

<body>

    <div class="card-container">

        <div class="card-header">
            <h2>Create an account</h2>
            <p>Get started with your free account today.</p>
        </div>

        <form id="register-form">

            <div class="form-group">
                <label for="email-inp" class="form-label">Email Address</label>
                <input type="email" id="email-inp" placeholder="name@example.com" class="form-input" required>
            </div>

            <div class="form-group">
                <label for="password-inp" class="form-label">Password</label>
                <input type="password" id="password-inp" placeholder="••••••••" class="form-input" required>
            </div>

            <button type="submit" class="submit-btn">Register Account</button>
        </form>
        <form id="register-form">
            <!-- <button type="submit" class="submit-btn">Register Account</button> -->
            
            <div class="divider">
                <span>Or continue with</span>
            </div>
        </form>

        <div class="social-login-container">
            <button type="button" id="google-btn" class="social-btn">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" class="social-icon">
                Google
            </button>
            <button type="button" id="facebook-btn" class="social-btn">
                <img src="https://www.svgrepo.com/show/475647/facebook-color.svg" alt="Facebook" class="social-icon">
                Facebook
            </button>
        </form>
        </div>
        <div class="login-redirect">
            Already have an account? <a href="login.html" class="login-link">Log in</a>
        </div>

        <!-- <div class="login-redirect">
            Already have an account? <a href="login.html" class="login-link">Log in</a>
        </div> -->

        <div id="message-box"></div>

        <div class="card-footer">
            <p class="footer-text">
                By signing up, you agree to our
                <a href="#" class="footer-link">Terms</a> &
                <a href="#" class="footer-link">Privacy Policy</a>.
            </p>
        </div>

    </div>

    <script type="module" src="app.js"></script>
</body>

</html>
